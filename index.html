<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TripCart — 旅行规划</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#f7f5f0;--yellow:#f0d040;--gray:#1a1a1a;
  --mid:#2e2e2e;--light:#444;--muted:#888;--border:#2a2a2a;
  --green:#4caf7d;--red:#e05050;
}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh}

/* HOME */
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.home-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:0.08em;color:var(--yellow);margin-bottom:6px}
.home-logo span{color:var(--white)}
.home-tagline{font-size:15px;color:var(--muted);margin-bottom:8px;font-weight:300}
.home-sub{font-size:12px;color:var(--light);margin-bottom:48px}
.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;width:100%;max-width:680px;margin-bottom:28px}
.city-card{background:var(--gray);border:1px solid var(--border);border-radius:14px;padding:18px 10px;cursor:pointer;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:7px}
.city-card:hover{border-color:var(--yellow);transform:translateY(-2px)}
.city-emoji{font-size:30px}.city-name{font-size:13px;font-weight:500}.city-sub-label{font-size:10px;color:var(--muted)}
.custom-row{display:flex;gap:10px;width:100%;max-width:420px}
.custom-input{flex:1;background:var(--gray);border:1px solid var(--border);color:var(--white);padding:13px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s}
.custom-input:focus{border-color:var(--yellow)}.custom-input::placeholder{color:var(--muted)}
.go-btn{padding:13px 22px;background:var(--yellow);color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.08em;border:none;border-radius:10px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.go-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,208,64,0.25)}

/* APP */
.app{display:none;height:100vh;flex-direction:column}.app.show{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;transition:color 0.15s;padding:4px}.back-btn:hover{color:var(--white)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--yellow)}.logo span{color:var(--white)}
.current-city{font-size:13px;color:var(--muted)}
.cart-badge{background:var(--yellow);color:var(--black);font-size:12px;font-weight:500;padding:4px 10px;border-radius:100px}
.main{display:flex;flex:1;overflow:hidden}

/* STORE */
.store{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.store-header{padding:14px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.store-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.store-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.1em;color:var(--muted)}
.reload-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s}.reload-btn:hover{border-color:var(--light);color:var(--white)}
.filters{display:flex;gap:7px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s}.filter-btn:hover{border-color:var(--light);color:var(--white)}.filter-btn.active{background:var(--yellow);border-color:var(--yellow);color:var(--black)}
.store-grid{flex:1;overflow-y:auto;padding:14px 22px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:11px;align-content:start}
.store-grid::-webkit-scrollbar{width:3px}.store-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.skeleton{background:var(--gray);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.skel-img{height:90px;background:linear-gradient(90deg,var(--gray) 25%,var(--mid) 50%,var(--gray) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
.skel-line{height:11px;border-radius:6px;margin:11px 11px 7px;background:linear-gradient(90deg,var(--gray) 25%,var(--mid) 50%,var(--gray) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}.skel-line.short{width:55%;margin-top:0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.place-card{background:var(--gray);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.18s;position:relative}.place-card:hover{border-color:var(--light);transform:translateY(-2px)}.place-card.in-cart{border-color:var(--yellow)}
.place-img{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-size:34px;background:var(--mid)}
.place-info{padding:10px}
.place-name{font-size:12px;font-weight:500;margin-bottom:2px;line-height:1.3}
.place-area{font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.07em}
.place-desc{font-size:11px;color:var(--light);line-height:1.4;margin-bottom:7px}
.place-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.tag{font-size:9px;padding:2px 6px;border-radius:100px;background:var(--mid);color:var(--muted)}
.add-btn{width:100%;padding:6px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--white);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s}.add-btn:hover,.place-card.in-cart .add-btn{background:var(--yellow);border-color:var(--yellow);color:var(--black)}
.in-cart-badge{position:absolute;top:6px;right:6px;background:var(--yellow);color:var(--black);font-size:9px;font-weight:500;padding:2px 6px;border-radius:100px;display:none}.place-card.in-cart .in-cart-badge{display:block}

/* CART */
.cart{width:330px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.cart-header{padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.cart-header h2{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.1em;color:var(--muted);margin-bottom:2px}
.cart-subtitle{font-size:11px;color:var(--light)}
.cart-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.cart-body::-webkit-scrollbar{width:3px}.cart-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cart-items{padding:10px 20px;flex:1}
.empty-cart{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;color:var(--light);text-align:center;gap:10px}
.empty-cart .empty-icon{font-size:34px;opacity:0.4}.empty-cart p{font-size:12px;line-height:1.6}
.cart-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);animation:slideIn 0.2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.cart-item-emoji{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-meta{font-size:10px;color:var(--muted)}.cart-item-custom{font-size:10px;color:var(--green)}
.remove-btn{background:none;border:none;color:var(--light);cursor:pointer;font-size:14px;padding:3px;transition:color 0.15s;flex-shrink:0}.remove-btn:hover{color:var(--red)}

.custom-add-section{padding:10px 20px;border-top:1px solid var(--border);flex-shrink:0}
.custom-add-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.custom-add-row{display:flex;gap:7px}
.custom-add-input{flex:1;background:var(--mid);border:1px solid var(--border);color:var(--white);padding:8px 11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border-color 0.15s}.custom-add-input:focus{border-color:var(--yellow)}.custom-add-input::placeholder{color:var(--light)}
.custom-add-btn{padding:8px 12px;background:var(--mid);border:1px solid var(--border);color:var(--white);border-radius:8px;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap}.custom-add-btn:hover{background:var(--yellow);border-color:var(--yellow);color:var(--black)}

.ai-suggest{margin:10px 20px;background:var(--mid);border:1px solid var(--border);border-radius:10px;padding:12px;display:none;flex-shrink:0}.ai-suggest.show{display:block}
.ai-suggest-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.ai-suggest-text{font-size:12px;color:var(--white);line-height:1.5;margin-bottom:10px}
.ai-suggest-days{display:flex;gap:6px;flex-wrap:wrap}
.day-chip{padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s}.day-chip:hover{border-color:var(--yellow);color:var(--yellow)}.day-chip.selected{background:var(--yellow);border-color:var(--yellow);color:var(--black);font-weight:500}

.cart-footer{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.suggest-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--border);color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;border-radius:10px;cursor:pointer;transition:all 0.15s}.suggest-btn:hover{border-color:var(--yellow);color:var(--yellow)}.suggest-btn:disabled{opacity:0.3;cursor:not-allowed}
.generate-btn{width:100%;padding:13px;background:var(--yellow);color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.1em;border:none;border-radius:10px;cursor:pointer;transition:all 0.18s}.generate-btn:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(240,208,64,0.25)}.generate-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center;padding:20px}.overlay.show{display:flex}
.overlay-box{background:var(--gray);border:1px solid var(--border);border-radius:20px;width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.overlay-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.overlay-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--yellow)}
.overlay-actions{display:flex;align-items:center;gap:10px}
.close-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;transition:color 0.15s}.close-btn:hover{color:var(--white)}
.copy-btn{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.15s}.copy-btn:hover{border-color:var(--white);color:var(--white)}
.overlay-body{flex:1;overflow-y:auto;padding:20px 24px}.overlay-body::-webkit-scrollbar{width:4px}.overlay-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.day-card{background:var(--black);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.day-card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.day-number{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:0.08em;color:var(--yellow)}
.day-theme{font-size:11px;color:var(--muted);margin-top:1px}
.day-energy{font-size:10px;padding:3px 10px;border-radius:100px;border:1px solid}
.energy-easy{color:var(--green);border-color:var(--green)}.energy-medium{color:var(--yellow);border-color:var(--yellow)}.energy-hard{color:#ff8c69;border-color:#ff8c69}
.day-card-body{padding:14px 18px}
.activity{display:flex;gap:12px;margin-bottom:11px;align-items:flex-start}.activity:last-child{margin-bottom:0}
.activity-time{font-size:10px;color:var(--muted);white-space:nowrap;margin-top:2px;width:48px;flex-shrink:0}
.activity-content{flex:1}
.activity-name{font-size:13px;font-weight:500;margin-bottom:2px}
.activity-desc{font-size:11px;color:var(--light);line-height:1.4}
.activity-duration{font-size:10px;color:var(--muted);margin-top:3px}
.day-food{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.day-food-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.day-food-items{font-size:12px;color:var(--light);line-height:1.6}
.tips-card{background:var(--mid);border-radius:12px;padding:14px 18px;margin-top:4px;margin-bottom:12px}
.tips-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px}
.tips-text{font-size:12px;color:var(--light);line-height:1.7}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:16px;color:var(--muted);font-size:13px}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .app{height:auto}.main{flex-direction:column}
  .store{border-right:none;border-bottom:1px solid var(--border);min-height:55vh}
  .cart{width:100%}.city-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="home" id="homeScreen">
  <div class="home-logo">TRIP<span>CART</span></div>
  <div class="home-tagline">像逛商店一样规划旅行</div>
  <div class="home-sub">选好想去的地方，AI 帮你搞定一切</div>
  <div class="city-grid">
    <div class="city-card" onclick="loadCity('纽约','🗽')"><div class="city-emoji">🗽</div><div class="city-name">纽约</div><div class="city-sub-label">New York</div></div>
    <div class="city-card" onclick="loadCity('东京','🗼')"><div class="city-emoji">🗼</div><div class="city-name">东京</div><div class="city-sub-label">Tokyo</div></div>
    <div class="city-card" onclick="loadCity('巴黎','🗺')"><div class="city-emoji">🗺</div><div class="city-name">巴黎</div><div class="city-sub-label">Paris</div></div>
    <div class="city-card" onclick="loadCity('京都','🏯')"><div class="city-emoji">🏯</div><div class="city-name">京都</div><div class="city-sub-label">Kyoto</div></div>
    <div class="city-card" onclick="loadCity('清迈','🌴')"><div class="city-emoji">🌴</div><div class="city-name">清迈</div><div class="city-sub-label">Chiang Mai</div></div>
    <div class="city-card" onclick="loadCity('巴厘岛','🏝')"><div class="city-emoji">🏝</div><div class="city-name">巴厘岛</div><div class="city-sub-label">Bali</div></div>
    <div class="city-card" onclick="loadCity('罗马','🍕')"><div class="city-emoji">🍕</div><div class="city-name">罗马</div><div class="city-sub-label">Rome</div></div>
    <div class="city-card" onclick="loadCity('夏威夷','🌺')"><div class="city-emoji">🌺</div><div class="city-name">夏威夷</div><div class="city-sub-label">Hawaii</div></div>
  </div>
  <div class="custom-row">
    <input class="custom-input" id="customCity" placeholder="或输入任何城市…" onkeydown="if(event.key==='Enter')goCustom()"/>
    <button class="go-btn" onclick="goCustom()">出发 →</button>
  </div>
</div>

<div class="app" id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="logo">TRIP<span>CART</span></div>
      <div class="current-city" id="currentCityLabel"></div>
    </div>
    <div class="cart-badge" id="cartCount">0 个地点</div>
  </div>
  <div class="main">
    <div class="store">
      <div class="store-header">
        <div class="store-header-top">
          <div class="store-title" id="storeTitle">加载中…</div>
          <button class="reload-btn" onclick="reloadPlaces()">↻ 换一批</button>
        </div>
        <div class="filters" id="filterBar"><button class="filter-btn active" onclick="filterPlaces('全部',this)">全部</button></div>
      </div>
      <div class="store-grid" id="storeGrid"></div>
    </div>

    <div class="cart">
      <div class="cart-header">
        <h2>我的行程单</h2>
        <div class="cart-subtitle">加入感兴趣的地点，AI 帮你排路线</div>
      </div>
      <div class="cart-body">
        <div class="cart-items" id="cartItems">
          <div class="empty-cart"><div class="empty-icon">🛒</div><p>点击左边的地点<br/>加入行程单</p></div>
        </div>
        <div class="custom-add-section">
          <div class="custom-add-label">✏️ 自己加一个</div>
          <div class="custom-add-row">
            <input class="custom-add-input" id="customItem" placeholder="例如：看百老汇、吃拉面…" onkeydown="if(event.key==='Enter')addCustomItem()"/>
            <button class="custom-add-btn" onclick="addCustomItem()">+ 加入</button>
          </div>
        </div>
        <div class="ai-suggest" id="aiSuggest">
          <div class="ai-suggest-label">✦ AI 天数建议</div>
          <div class="ai-suggest-text" id="aiSuggestText"></div>
          <div class="ai-suggest-days" id="aiSuggestDays"></div>
        </div>
      </div>
      <div class="cart-footer">
        <button class="suggest-btn" id="suggestBtn" onclick="getSuggestion()" disabled>✦ 问 AI 建议几天？</button>
        <button class="generate-btn" id="generateBtn" onclick="generateItinerary()" disabled>生成行程单 →</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-header">
      <div class="overlay-title" id="overlayTitle">你的旅行行程</div>
      <div class="overlay-actions">
        <button class="copy-btn" onclick="copyResult()">复制</button>
        <button class="close-btn" onclick="closeOverlay()">✕</button>
      </div>
    </div>
    <div class="overlay-body" id="overlayBody">
      <div class="loading-state" id="loadingState"><div class="spinner"></div><div>AI 正在规划你的行程…</div></div>
      <div id="itineraryContent" style="display:none"></div>
    </div>
  </div>
</div>

<script>
let currentCity='',currentEmoji='',allPlaces=[],cart=[],currentFilter='全部',selectedDays=null,customIdCounter=1000;

function goHome(){document.getElementById('homeScreen').style.display='flex';document.getElementById('appScreen').classList.remove('show');cart=[];allPlaces=[];selectedDays=null;}
function goCustom(){const v=document.getElementById('customCity').value.trim();if(v)loadCity(v,'🌍');}

async function loadCity(name,emoji){
  currentCity=name;currentEmoji=emoji;cart=[];selectedDays=null;
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('appScreen').classList.add('show');
  document.getElementById('currentCityLabel').textContent=`${emoji} ${name}`;
  document.getElementById('storeTitle').textContent='景点加载中…';
  document.getElementById('aiSuggest').classList.remove('show');
  updateCart();showSkeletons();await fetchPlaces(name);
}

async function reloadPlaces(){showSkeletons();await fetchPlaces(currentCity);}

function showSkeletons(){
  document.getElementById('storeGrid').innerHTML=Array(12).fill(0).map(()=>
    `<div class="skeleton"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line short"></div></div>`).join('');
}

async function fetchPlaces(city){
  const prompt=`为"${city}"生成20个值得去的地点。只返回JSON，无其他文字：
{"places":[{"name":"名称","area":"区域","desc":"简介15字内","emoji":"emoji","tags":["标签"],"duration":"如2小时","energy":"low/medium/high"}]}
标签只选：景点、美食、博物馆、购物、公园、艺术、夜生活、体验、自然、拍照`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    let text=data.content?.[0]?.text||'';
    text=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);
    allPlaces=parsed.places.map((p,i)=>({...p,id:i+1}));
    renderFilterBar();renderStore(allPlaces);
    document.getElementById('storeTitle').textContent=`${currentEmoji} ${currentCity.toUpperCase()}`;
  }catch(e){
    document.getElementById('storeGrid').innerHTML=`<div style="color:var(--muted);padding:40px;text-align:center;grid-column:1/-1;font-size:13px">加载失败，请点"换一批"重试</div>`;
  }
}

function renderFilterBar(){
  const tags=[...new Set(allPlaces.flatMap(p=>p.tags))];
  document.getElementById('filterBar').innerHTML=`<button class="filter-btn active" onclick="filterPlaces('全部',this)">全部</button>`+tags.map(t=>`<button class="filter-btn" onclick="filterPlaces('${t}',this)">${t}</button>`).join('');
}

function filterPlaces(f,btn){
  currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  renderStore(f==='全部'?allPlaces:allPlaces.filter(p=>p.tags.includes(f)));
}

function renderStore(places){
  const grid=document.getElementById('storeGrid');
  if(!places.length){grid.innerHTML=`<div style="color:var(--muted);padding:40px;text-align:center;grid-column:1/-1">没有相关地点</div>`;return;}
  grid.innerHTML=places.map(p=>`
    <div class="place-card ${cart.find(c=>c.id===p.id)?'in-cart':''}" id="card-${p.id}">
      <div class="place-img">${p.emoji}</div>
      <div class="in-cart-badge">✓</div>
      <div class="place-info">
        <div class="place-name">${p.name}</div>
        <div class="place-area">${p.area}</div>
        <div class="place-desc">${p.desc}</div>
        <div class="place-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <button class="add-btn" onclick="toggleCart(${p.id})">${cart.find(c=>c.id===p.id)?'✓ 已加入':'+ 加入行程单'}</button>
      </div>
    </div>`).join('');
}

function toggleCart(id){
  const p=allPlaces.find(p=>p.id===id);const idx=cart.findIndex(c=>c.id===id);
  if(idx>-1)cart.splice(idx,1);else cart.push(p);
  updateCart();renderStore(currentFilter==='全部'?allPlaces:allPlaces.filter(p=>p.tags.includes(currentFilter)));
}

function addCustomItem(){
  const input=document.getElementById('customItem');const val=input.value.trim();if(!val)return;
  cart.push({id:customIdCounter++,name:val,area:'自定义',desc:'',emoji:'📝',tags:[],duration:'自定',energy:'low',isCustom:true});
  input.value='';updateCart();document.getElementById('aiSuggest').classList.remove('show');selectedDays=null;
}

function removeFromCart(id){
  cart=cart.filter(c=>c.id!==id);updateCart();
  renderStore(currentFilter==='全部'?allPlaces:allPlaces.filter(p=>p.tags.includes(currentFilter)));
}

function updateCart(){
  const container=document.getElementById('cartItems');
  document.getElementById('cartCount').textContent=`${cart.length} 个地点`;
  document.getElementById('suggestBtn').disabled=cart.length===0;
  document.getElementById('generateBtn').disabled=cart.length===0||!selectedDays;
  if(!cart.length){container.innerHTML=`<div class="empty-cart"><div class="empty-icon">🛒</div><p>点击左边的地点<br/>加入行程单</p></div>`;return;}
  container.innerHTML=cart.map(p=>`
    <div class="cart-item">
      <div class="cart-item-emoji">${p.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="${p.isCustom?'cart-item-custom':'cart-item-meta'}">${p.isCustom?'✏️ 自定义':p.area}</div>
      </div>
      <button class="remove-btn" onclick="removeFromCart(${p.id})">×</button>
    </div>`).join('');
}

function selectDays(days){
  selectedDays=days;
  document.querySelectorAll('.day-chip').forEach(c=>{c.classList.toggle('selected',c.dataset.days==days);});
  document.getElementById('generateBtn').disabled=false;
}

async function getSuggestion(){
  const btn=document.getElementById('suggestBtn');btn.disabled=true;btn.textContent='分析中…';
  document.getElementById('aiSuggest').classList.add('show');
  document.getElementById('aiSuggestText').textContent='正在分析你的行程单…';
  document.getElementById('aiSuggestDays').innerHTML='';
  const list=cart.map(p=>`${p.name}(${p.energy||'medium'})`).join('、');
  const prompt=`用户选了以下地点去${currentCity}：${list}。给出天数建议，只返回JSON：
{"suggestion":"建议理由30字内","recommended":5,"options":[4,5,6]}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    let text=data.content?.[0]?.text||'';text=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);
    document.getElementById('aiSuggestText').textContent=parsed.suggestion;
    document.getElementById('aiSuggestDays').innerHTML=parsed.options.map(d=>
      `<button class="day-chip ${d===parsed.recommended?'selected':''}" data-days="${d}" onclick="selectDays(${d})">${d}天${d===parsed.recommended?' ✦':''}</button>`).join('');
    if(!selectedDays){selectedDays=parsed.recommended;document.getElementById('generateBtn').disabled=false;}
  }catch(e){
    document.getElementById('aiSuggestText').textContent='请手动选择天数';
    document.getElementById('aiSuggestDays').innerHTML=[3,4,5,6,7].map(d=>
      `<button class="day-chip" data-days="${d}" onclick="selectDays(${d})">${d}天</button>`).join('');
  }
  btn.disabled=false;btn.innerHTML='✦ 问 AI 建议几天？';
}

async function generateItinerary(){
  document.getElementById('overlay').classList.add('show');
  document.getElementById('loadingState').style.display='flex';
  document.getElementById('itineraryContent').style.display='none';
  document.getElementById('overlayTitle').textContent=`${currentEmoji} ${currentCity} · ${selectedDays}天行程`;
  const list=cart.map(p=>`- ${p.name}（${p.area}，体力:${p.energy||'medium'}，时长:${p.duration||'2小时'}）`).join('\n');
  const prompt=`为用户规划${currentCity} ${selectedDays}天行程。只返回JSON：
{"days":[{"day":1,"theme":"主题","area":"区域","energy":"easy/medium/hard","activities":[{"time":"09:00","name":"地点","desc":"亮点一句话","duration":"时长"}],"food":["午餐：xxx","晚餐：xxx"]}],"tips":"2-3条贴士","hotel":"住宿建议一句话"}
用户选择：\n${list}
要求：按地理位置聚合，每天3-5个活动，体力合理分配，地点不够补充同区域推荐。`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    let text=data.content?.[0]?.text||'';text=text.replace(/```json|```/g,'').trim();
    renderItinerary(JSON.parse(text));
  }catch(e){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('itineraryContent').style.display='block';
    document.getElementById('itineraryContent').innerHTML='<p style="color:var(--red);padding:20px">生成失败，请重试</p>';
  }
}

function renderItinerary(data){
  const em={easy:{label:'轻松',cls:'energy-easy'},medium:{label:'适中',cls:'energy-medium'},hard:{label:'充实',cls:'energy-hard'}};
  let html=data.days.map(day=>{
    const e=em[day.energy]||em.medium;
    return `<div class="day-card">
      <div class="day-card-header">
        <div><div class="day-number">DAY ${day.day} · ${day.theme}</div><div class="day-theme">${day.area}</div></div>
        <div class="day-energy ${e.cls}">${e.label}</div>
      </div>
      <div class="day-card-body">
        ${day.activities.map(a=>`<div class="activity">
          <div class="activity-time">${a.time}</div>
          <div class="activity-content">
            <div class="activity-name">${a.name}</div>
            <div class="activity-desc">${a.desc}</div>
            <div class="activity-duration">⏱ ${a.duration}</div>
          </div></div>`).join('')}
        <div class="day-food"><div class="day-food-label">🍽 今日美食</div><div class="day-food-items">${day.food.join('<br>')}</div></div>
      </div></div>`;
  }).join('');
  html+=`<div class="tips-card"><div class="tips-label">🏨 住宿建议</div><div class="tips-text">${data.hotel}</div></div>
  <div class="tips-card"><div class="tips-label">💡 实用贴士</div><div class="tips-text">${data.tips}</div></div>`;
  document.getElementById('loadingState').style.display='none';
  document.getElementById('itineraryContent').innerHTML=html;
  document.getElementById('itineraryContent').style.display='block';
}

function closeOverlay(){document.getElementById('overlay').classList.remove('show');}
function copyResult(){
  navigator.clipboard.writeText(document.getElementById('itineraryContent').innerText).then(()=>{
    const btn=document.querySelector('.copy-btn');btn.textContent='已复制 ✓';setTimeout(()=>btn.textContent='复制',2000);
  });
}
</script>
</body>
</html>
